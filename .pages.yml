# Pages CMS 설정 (pagescms.org) — GitHub 로그인 후 폼 기반 관리자 화면 제공
# 저장 = 커밋 = Cloudflare 자동 배포 (몇 분 뒤 사이트 반영)

media:
  input: assets/screenshots
  output: /assets/screenshots

content:
  - name: projects
    label: 프로젝트
    type: collection
    path: content/projects
    extension: mdx
    format: yaml-frontmatter
    view:
      fields: [title, status, date, featured]
    fields:
      - name: title
        label: 이름
        type: string
        required: true
      - name: description
        label: 한 줄 설명
        type: string
        required: true
      - name: thumbnail
        label: 썸네일 경로
        type: string
        description: "/thumbnails/<파일이름>.png — assets/screenshots에 <파일이름>.png 스크린샷을 올리면 빌드가 프레임 썸네일을 자동 생성"
        required: true
      - name: liveUrl
        label: 서비스 링크
        type: string
        required: true
      - name: repoUrl
        label: GitHub 링크 (선택)
        type: string
      - name: ctaText
        label: CTA 버튼 문구 (선택, 기본 "사용해보기")
        type: string
      - name: status
        label: 상태
        type: select
        options:
          values: [live, beta, archived]
        required: true
      - name: tags
        label: 태그
        type: string
        list: true
      - name: date
        label: 날짜
        type: date
        required: true
      - name: featured
        label: 홈 Featured 노출
        type: boolean
      - name: body
        label: 본문 (MDX — SectionTitle/FeatureGrid/Feature 구조를 유지하며 문구만 수정 권장)
        type: text

  - name: site
    label: 사이트 문구
    type: file
    path: content/site.json
    fields:
      - name: siteName
        label: 사이트 이름
        type: string
      - name: operatorName
        label: 운영자명 (저작권 표기)
        type: string
      - name: siteDescription
        label: 사이트 설명 (검색·공유 미리보기)
        type: string
      - name: contactEmail
        label: 연락 이메일
        type: string
      - name: heroTagline
        label: 홈 태그라인 (분홍 알약)
        type: string
      - name: heroTitle
        label: 홈 큰 제목
        type: string
      - name: heroSubtitle
        label: 홈 부가 문장
        type: string
      - name: aboutDescription
        label: About 페이지 설명 (검색·공유 미리보기)
        type: string
      - name: aboutParagraphs
        label: About 소개 문단
        type: text
        list: true
